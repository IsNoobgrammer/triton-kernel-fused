<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="triton-kernel-fused logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#F5F3FF"/>
      <stop offset="0.45" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </radialGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="58" fill="url(#bg)"/>

  <!-- pins -->
  <g fill="#EDE9FE">
    <rect x="94"  y="60"  width="12" height="20" rx="3"/>
    <rect x="122" y="60"  width="12" height="20" rx="3"/>
    <rect x="150" y="60"  width="12" height="20" rx="3"/>
    <rect x="94"  y="176" width="12" height="20" rx="3"/>
    <rect x="122" y="176" width="12" height="20" rx="3"/>
    <rect x="150" y="176" width="12" height="20" rx="3"/>
    <rect x="60"  y="94"  width="20" height="12" rx="3"/>
    <rect x="60"  y="122" width="20" height="12" rx="3"/>
    <rect x="60"  y="150" width="20" height="12" rx="3"/>
    <rect x="176" y="94"  width="20" height="12" rx="3"/>
    <rect x="176" y="122" width="20" height="12" rx="3"/>
    <rect x="176" y="150" width="20" height="12" rx="3"/>
  </g>

  <!-- chip body -->
  <rect x="78" y="78" width="100" height="100" rx="22" fill="#5B21B6" stroke="#EDE9FE" stroke-width="7"/>

  <!-- glowing core -->
  <circle cx="128" cy="128" r="30" fill="url(#core)"/>
  <circle cx="128" cy="128" r="11" fill="#FFFFFF"/>
</svg>
